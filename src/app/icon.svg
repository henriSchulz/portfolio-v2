  <!-- Gate Inputs -->
  <line x1="26" y1="33" x2="30" y2="33" stroke="#22d3ee" stroke-width="2"/>
  <line x1="26" y1="39" x2="30" y2="39" stroke="#22d3ee" stroke-width="2"/>

  <!-- Gate Output -->
